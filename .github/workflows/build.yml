name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt
        id: cache-qt-linux
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Qt
          key: qt-6.7-linux-${{ runner.os }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          host: 'linux'
          target: 'desktop'
          dir: ${{ runner.temp }}/Qt
          cache: true

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Confirm binary exists
        run: test -f build/GHEControl && echo "Binary OK"

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt
        id: cache-qt-windows
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\Qt
          key: qt-6.7-windows-${{ runner.os }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: ${{ runner.temp }}\Qt
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build

      - name: Confirm binary exists
        run: |
          if (Test-Path "build\GHEControl.exe") {
            Write-Output "Binary OK"
          } else {
            Write-Error "Binary not found"
            exit 1
          }
        shell: pwsh
